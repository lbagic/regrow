# Local Time Machine snapshots — the big chunk of "System Data"
# phantom space (docs/research/02 §10). Per-snapshot deletion by the
# date embedded in the name (Prompt G0 refit; was thinlocalsnapshots —
# decision logged in ARCHITECTURE.md). External TM backups are
# untouched. OS-update snapshots (com.apple.os.update-*) are
# system-managed and not listed.
id: tm-snapshots
title: Time Machine local snapshots
category: macos
risk: caution
tool_query: tm-snapshots
native_command: tmutil deletelocalsnapshots {arg}
note: Snapshot sizes are invisible until deleted — freed space shows up as purgeable, sometimes minutes later.
regen:
  story: macOS creates fresh local snapshots on the next backup cycle.
  cost: point-in-time restores between backups are gone
sudo: true
fixture:
  # APFS cannot size snapshots pre-delete; items carry zero bytes
  items:
    - label: com.apple.TimeMachine.2026-07-12-090000.local
      arg: 2026-07-12-090000
    - label: com.apple.TimeMachine.2026-07-13-090000.local
      arg: 2026-07-13-090000
